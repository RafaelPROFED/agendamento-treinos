<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 320px; }
    h2 { text-align: center; color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #45a049; }
    p { text-align: center; margin-top: 16px; }
    a { color: #4CAF50; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🏋️ Agendamento de Treinos</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p>Não tem conta? <a href="cadastro.html">Cadastrar</a></p>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const res = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = 'treinos.html';
      } else {
        alert(data.erro);
      }
    }
  </script>
</body>
</html>
