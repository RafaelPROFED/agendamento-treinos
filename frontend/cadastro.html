<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 320px; }
    h2 { text-align: center; color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 8px; }
    button:hover { background: #45a049; }
    p { text-align: center; margin-top: 16px; }
    a { color: #4CAF50; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Criar conta</h2>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <input type="text" id="cep" placeholder="CEP" onblur="buscarCep()">
    <input type="text" id="endereco" placeholder="Endereço (preenchido automático)">
    <button id="btnCadastrar">Cadastrar</button>
    <p>Já tem conta? <a href="index.html">Entrar</a></p>
  </div>
  <script>
    document.getElementById('btnCadastrar').addEventListener('click', cadastrar);

    async function buscarCep() {
      const cep = document.getElementById('cep').value.replace(/\D/g, '');
      if (cep.length !== 8) return;
      try {
        const res = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
        const data = await res.json();
        if (!data.erro) {
          document.getElementById('endereco').value = data.logradouro + ', ' + data.bairro + ', ' + data.localidade + ' - ' + data.uf;
        }
      } catch(e) {
        console.log('Erro ao buscar CEP:', e);
      }
    }

    async function cadastrar() {
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const cep = document.getElementById('cep').value;
      const endereco = document.getElementById('endereco').value;

      if (!nome || !email || !senha) {
        alert('Preencha todos os campos obrigatórios!');
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha, cep, endereco })
        });
        const data = await res.json();
        if (res.ok) {
          alert('Cadastro realizado com sucesso!');
          window.location.href = 'index.html';
        } else {
          alert('Erro: ' + data.erro);
        }
      } catch(e) {
        alert('Erro ao conectar com o servidor. Verifique se o servidor está rodando!');
        console.log(e);
      }
    }
  </script>
</body>
</html>
